<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="eventBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5f7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#eventBg)" />

  <!-- Decorative elements -->
  <circle cx="350" cy="50" r="40" fill="#4f46e5" opacity="0.08" />
  <circle cx="50" cy="250" r="45" fill="#7c3aed" opacity="0.1" />
  <rect x="100" y="120" width="200" height="150" rx="8" fill="#ffffff" opacity="0.4" />

  <!-- Calendar/Event cards stack -->
  <g>
    <!-- Card 1 (back) -->
    <rect x="80" y="100" width="110" height="140" rx="6" fill="#ffffff" stroke="#4f46e5" stroke-width="2" opacity="0.6" transform="rotate(-8 135 170)" />
    <rect x="85" y="105" width="100" height="25" fill="#4f46e5" opacity="0.2" rx="3" />
    <text x="135" y="122" font-family="Poppins, sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#4f46e5">Workshop</text>

    <!-- Card 2 (middle) -->
    <rect x="90" y="90" width="110" height="140" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="2" opacity="0.8" transform="rotate(-4 145 160)" />
    <rect x="95" y="95" width="100" height="25" fill="#7c3aed" opacity="0.2" rx="3" />
    <text x="145" y="112" font-family="Poppins, sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#7c3aed">Hackathon</text>
    <line x1="100" y1="130" x2="180" y2="130" stroke="#7c3aed" stroke-width="1" opacity="0.3" />
    <line x1="100" y1="140" x2="180" y2="140" stroke="#7c3aed" stroke-width="1" opacity="0.3" />
    <line x1="100" y1="150" x2="180" y2="150" stroke="#7c3aed" stroke-width="1" opacity="0.3" />

    <!-- Card 3 (front) -->
    <rect x="100" y="80" width="110" height="140" rx="6" fill="#ffffff" stroke="#4f46e5" stroke-width="2" />
    <rect x="105" y="85" width="100" height="25" fill="#4f46e5" opacity="0.15" rx="3" />
    <text x="155" y="102" font-family="Poppins, sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#4f46e5">Tech Talk</text>

    <!-- Event details on front card -->
    <line x1="110" y1="120" x2="190" y2="120" stroke="#4f46e5" stroke-width="1" opacity="0.4" />
    <line x1="110" y1="130" x2="190" y2="130" stroke="#4f46e5" stroke-width="1" opacity="0.4" />
    <line x1="110" y1="140" x2="190" y2="140" stroke="#4f46e5" stroke-width="1" opacity="0.4" />
    <line x1="110" y1="150" x2="190" y2="150" stroke="#4f46e5" stroke-width="1" opacity="0.4" />
    <line x1="110" y1="160" x2="150" y2="160" stroke="#4f46e5" stroke-width="1" opacity="0.4" />

    <!-- Small checkmark to show approval -->
    <circle cx="185" cy="85" r="12" fill="#059669" opacity="0.9" />
    <path d="M 181 85 L 184 88 L 189 83" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Right side: attendee icons -->
  <g transform="translate(260, 110)">
    <!-- Person 1 -->
    <circle cx="0" cy="0" r="12" fill="#f4a261" opacity="0.8" />
    <circle cx="0" cy="-8" r="6" fill="#f4a261" opacity="0.8" />

    <!-- Person 2 -->
    <circle cx="30" cy="15" r="12" fill="#7c3aed" opacity="0.7" />
    <circle cx="30" cy="7" r="6" fill="#7c3aed" opacity="0.7" />

    <!-- Person 3 -->
    <circle cx="15" cy="35" r="12" fill="#4f46e5" opacity="0.8" />
    <circle cx="15" cy="27" r="6" fill="#4f46e5" opacity="0.8" />

    <!-- Plus badge for "more people" -->
    <circle cx="45" cy="25" r="10" fill="#ffffff" stroke="#4f46e5" stroke-width="1.5" />
    <text x="45" y="30" font-family="Poppins, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#4f46e5">+</text>
  </g>

  <!-- Text labels -->
  <text x="200" y="270" font-family="Poppins, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#4f46e5">
    Manage events effortlessly
  </text>
  <text x="200" y="290" font-family="Poppins, sans-serif" font-size="11" text-anchor="middle" fill="#6b7280">
    Create, approve &amp; track
  </text>
</svg>
