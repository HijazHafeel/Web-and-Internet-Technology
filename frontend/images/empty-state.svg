<svg viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="emptyBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="250" fill="url(#emptyBg)" />

  <!-- Decorative circles -->
  <circle cx="250" cy="40" r="30" fill="#4f46e5" opacity="0.05" />
  <circle cx="50" cy="200" r="40" fill="#7c3aed" opacity="0.06" />

  <!-- Large magnifying glass -->
  <g transform="translate(150, 100)">
    <!-- Magnifying glass circle -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#cbd5e1" stroke-width="3" />
    <!-- Magnifying glass handle -->
    <line x1="32" y1="32" x2="55" y2="55" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" />
    <!-- Question mark inside -->
    <text x="0" y="12" font-family="Poppins, sans-serif" font-size="32" font-weight="600" text-anchor="middle" fill="#4f46e5" opacity="0.6">?</text>
  </g>

  <!-- Floating item icons (suggesting search) -->
  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="40" height="30" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="0.7" />
    <circle cx="8" cy="8" r="2" fill="#4f46e5" opacity="0.5" />
    <line x1="12" y1="8" x2="30" y2="8" stroke="#4f46e5" stroke-width="0.8" opacity="0.4" />
    <line x1="8" y1="16" x2="30" y2="16" stroke="#4f46e5" stroke-width="0.8" opacity="0.4" />
  </g>

  <g transform="translate(200, 80)">
    <rect x="0" y="0" width="40" height="30" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="0.6" />
    <circle cx="8" cy="8" r="2" fill="#4f46e5" opacity="0.5" />
    <line x1="12" y1="8" x2="30" y2="8" stroke="#4f46e5" stroke-width="0.8" opacity="0.4" />
    <line x1="8" y1="16" x2="30" y2="16" stroke="#4f46e5" stroke-width="0.8" opacity="0.4" />
  </g>

  <!-- Text message -->
  <text x="150" y="190" font-family="Poppins, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#111827">
    No results found
  </text>
  <text x="150" y="210" font-family="Poppins, sans-serif" font-size="12" text-anchor="middle" fill="#6b7280">
    Try adjusting your search
  </text>
</svg>
